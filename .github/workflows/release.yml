# Release: on `v*` tag push, build sdist + wheel, publish to PyPI via
# OIDC trusted publishing (no API token), and create a GitHub Release
# with the dist artifacts attached.
#
# pyusbip is pure Python, so a single universal wheel works on every
# OS — no cibuildwheel matrix needed. The macOS-specific behaviour
# lives at *runtime* (libusb / IOKit), not in the build.
#
# Tag → version contract:
#   * The single source of truth for the version is
#     `pyusbip.__version__` in pyusbip/__init__.py. pyproject.toml
#     reads it dynamically. The release workflow refuses to publish
#     if the git tag (stripped of its leading `v`) doesn't match —
#     catches "forgot to bump __version__ before tagging".
#
# One-time setup before the first tag push:
#   1. Reserve the `pyusbip` name on PyPI:
#        https://pypi.org/manage/account/publishing/
#      Add a "pending publisher" with:
#        owner       = jenish-rudani
#        repo        = pyusbip
#        workflow    = release.yml
#        environment = pypi
#   2. In this repo's Settings → Environments, create an environment
#      named `pypi` (no secrets needed — OIDC handles auth).
#   After that, every `git tag vX.Y.Z && git push --tags` ships.

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.verify.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tooling
        run: pip install build twine

      - name: Verify tag matches pyusbip.__version__
        id: verify
        # REF_NAME is passed via env (not interpolated into the shell
        # script) so a hypothetical malicious tag name can't break out
        # of the variable. See:
        # https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/
        #
        # We read _version.py via runpy.run_path (not `import
        # pyusbip._version`) because importing a submodule still
        # executes the parent package's __init__.py, which would pull
        # in libusb1 / the libusb dylib. runpy.run_path runs the file
        # in a fresh namespace with no package init — the same trick
        # setuptools uses to resolve [tool.setuptools.dynamic] without
        # installing the project's runtime deps.
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          PKG_VERSION=$(python -c "import runpy; print(runpy.run_path('pyusbip/_version.py')['__version__'])")
          TAG_VERSION="${REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag '$TAG_VERSION' does not match pyusbip.__version__ '$PKG_VERSION'. Bump __version__ in pyusbip/__init__.py and re-tag."
            exit 1
          fi
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build sdist and wheel
        run: python -m build

      - name: Sanity-check built artifacts
        # `twine check` validates that the long_description (README.md)
        # renders cleanly on PyPI. Catches broken Markdown before we
        # burn a release on it.
        run: twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    # Environment binds this job to the PyPI trusted publisher
    # configured under the same name. The link in `url` shows up on
    # the GitHub Releases page for convenience.
    environment:
      name: pypi
      url: https://pypi.org/p/pyusbip
    permissions:
      # Required for OIDC trusted publishing. No PYPI_API_TOKEN needed.
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: [build, publish-pypi]
    runs-on: ubuntu-latest
    permissions:
      # Needed to create the Release and upload assets.
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Create GitHub Release
        # REF_NAME via env for the same reason as the verify step above.
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
        # --generate-notes pulls commit subjects since the previous
        # tag into the body, which matches the existing release-note
        # style ("1.1.3: suppress RET_SUBMIT for UNLINK'd URBs…").
        run: |
          gh release create "$REF_NAME" \
            --title "pyusbip $REF_NAME" \
            --generate-notes \
            dist/*
